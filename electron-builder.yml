appId: com.lecta.app
productName: Lecta
copyright: Copyright © 2026 Rui Machado

directories:
  buildResources: build
  output: release

files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!packages/*"
  - "!example-decks/*"
  - "!electron-vite.config.*"
  - "!{.eslintignore,.eslintrc*,prettier.config.*,.prettierrc*}"
  - "!{tsconfig.json,tsconfig.*.json}"

mac:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  artifactName: "${productName}-${version}-setup.${ext}"
  target:
    - target: nsis
      arch:
        - x64

linux:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
